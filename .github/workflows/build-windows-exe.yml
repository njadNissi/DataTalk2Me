name: Build Streamlit Windows EXE
on:
  push:
    branches: [ main ]

# Force Node.js 24 to eliminate deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4  # This is already Node.js 24 compatible
      
      - name: Set up Python
        uses: actions/setup-python@v5  # Also Node.js 24 compatible
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          
      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --collect-all streamlit --hidden-import=streamlit.web.cli --hidden-import=streamlit.web --hidden-import=streamlit launcher.py
          
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: DataTalk2Me
          path: dist/*.exe
